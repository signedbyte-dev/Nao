name: Publish NuGet Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet paket restore

      - name: Build
        run: dotnet build Nao.slnx -c Release

      - name: Test
        run: dotnet test Nao.slnx -c Release --no-build

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack Nao.slnx -c Release --no-build -o ./nupkgs -p:Version=${{ steps.version.outputs.version }}

      - name: Login to NuGet (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USERNAME }}

      - name: Publish to NuGet
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish Assistant Desktop
        run: |
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            dotnet publish src/Nao.Assistant/Nao.Assistant.fsproj -c Release \
              -r $rid --self-contained -o ./release/Nao.Assistant-$rid
          done

      - name: Archive release binaries
        run: |
          cd release
          for dir in */; do
            name="${dir%/}"
            tar -czf "${name}.tar.gz" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release/*.tar.gz
          generate_release_notes: true
