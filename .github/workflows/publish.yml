name: Publish NuGet Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet paket restore

      - name: Build
        run: dotnet build Nao.slnx -c Release

      - name: Test
        run: dotnet test Nao.slnx -c Release --no-build

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack Nao.slnx -c Release --no-build -o ./nupkgs -p:Version=${{ steps.version.outputs.version }}

      - name: Publish to NuGet (Trusted Publishing)
        run: |
          for pkg in ./nupkgs/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json
          done
